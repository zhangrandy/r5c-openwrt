name: Build OpenWrt 25.12.0 for NanoPi R5C

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: v25.12.0

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Free Disk Space & Create Swap
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force
        sudo fallocate -l 8G /swapfile
        sudo chmod 600 /swapfile
        sudo mkswap /swapfile
        sudo swapon /swapfile
        echo "Memory and Swap Status:"
        free -h

    - name: Initialize Environment (Comprehensive)
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp ninja-build p7zip p7zip-full patch pkgconf python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean

    - name: Clone OpenWrt Source
      run: |
        git clone --depth 1 $REPO_URL -b $REPO_BRANCH openwrt

    - name: Update and Install Feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Configure Network Settings (uci-defaults)
      run: |
        mkdir -p openwrt/files/etc/uci-defaults
        cat << 'EOF' > openwrt/files/etc/uci-defaults/99-custom-network
        #!/bin/sh
        uci set network.lan.ipaddr='192.168.1.4/24'
        uci delete network.lan.netmask || true
        uci set network.lan.gateway='192.168.1.1'
        uci del_list network.lan.dns='192.168.1.1' || true
        uci add_list network.lan.dns='192.168.1.1'
        uci commit network
        EOF
        chmod +x openwrt/files/etc/uci-defaults/99-custom-network

    - name: Generate Configuration
      run: |
        cd openwrt
        
        echo "CONFIG_TARGET_rockchip=y" > .config
        echo "CONFIG_TARGET_rockchip_armv8=y" >> .config
        echo "CONFIG_TARGET_rockchip_armv8_DEVICE_friendlyarm_nanopi-r5c=y" >> .config
        
        echo "CONFIG_TARGET_ROOTFS_PARTSIZE=2048" >> .config
        echo "CONFIG_TARGET_ROOTFS_SQUASHFS=y" >> .config
        echo "# CONFIG_TARGET_ROOTFS_EXT4 is not set" >> .config
        
        make defconfig

    - name: Download Dependencies
      run: |
        cd openwrt
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile Firmware
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        export CI=false
        make -j$(nproc) || make -j1 || make -j1 V=s

    - name: Prepare Artifacts
      id: organize
      run: |
        cd openwrt/bin/targets/rockchip/armv8
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV

    - name: Generate Release Tag
      id: tag
      run: |
        echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_ENV
        echo "release_date=$(date +"%Y-%m-%d")" >> $GITHUB_ENV

    - name: Upload Firmware to GitHub Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: OpenWrt_25.12.0_NanoPi_R5C_Base
        path: ${{ env.FIRMWARE }}/*squashfs*

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ env.release_tag }}
        name: OpenWrt 25.12.0 NanoPi R5C - ${{ env.release_date }}
        files: ${{ env.FIRMWARE }}/*squashfs*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
